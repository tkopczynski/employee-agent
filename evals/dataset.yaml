  - query: "remind me about commencing that programme and laying out its go live checkpoints"
    arm: semantic
    expect_conversation: 19
  - query: "the effort to rework how fresh employees are brought aboard"
    arm: semantic
    expect_conversation: 20

  # ===== Keyword probes (13) — hinge on a rare exact token =================
  # The discriminating pair: ERR_4711 / PAYSVC 502 / "Project Halibut" appear
  # verbatim only in their target; sibling distractors (conv 6, conv 20)
  # paraphrase the same topic without the token, so only the keyword arm
  # resolves them (US-20). The remaining keyword probes are exact phrases the
  # User would recall, where sibling reports/trips/infra force ranking.

  - query: "ERR_4711"
    arm: keyword
    expect_conversation: 4
  - query: "investigate the ERR_4711 migration failure"
    arm: keyword
    expect_conversation: 4
  - query: "PAYSVC 502"
    arm: keyword
    expect_conversation: 5
  - query: "PAYSVC 502 payment service"
    arm: keyword
    expect_conversation: 5
  - query: "Project Halibut"
    arm: keyword
    expect_conversation: 19
  - query: "kick off Project Halibut milestones"
    arm: keyword
    expect_conversation: 19

  - query: "Q1 revenue report"
    arm: keyword
    expect_conversation: 1
  - query: "Q3 headcount report"
    arm: keyword
    expect_conversation: 2
  - query: "competitor teardown report Acme"
    arm: keyword
    expect_conversation: 3
  - query: "two week trip to Japan in autumn"
    arm: keyword
    expect_conversation: 7
  - query: "Postgres connection pool exhausted"
    arm: keyword
    expect_conversation: 13
  - query: "Kafka consumer lag partitions"
    arm: keyword
    expect_conversation: 15
  - query: "Redis cache eviction policy"
    arm: keyword
    expect_conversation: 14
