      - { role: user,  text: "I want to organise a surfing holiday along the Portuguese coast in June." }
      - { role: agent, text: "Ericeira and Sagres in June would be ideal for surf." }
    golden:
      requests: ["Organise a June surfing holiday on the Portuguese coast"]
      summary: "Organise a surfing holiday along the Portuguese coast in June."
      outcomes: ["Sketched an Ericeira-Sagres surf plan"]

  - id: 9
