    golden:
      requests: ["Kick off Project Halibut and set the launch milestones"]
      summary: "Kick off Project Halibut and line up its launch milestones."
      outcomes: ["Project Halibut milestones approved"]

  - id: 20
    topic: "Onboarding overhaul initiative (codename-free distractor)"
    turns:
      - { role: user,  text: "Spin up the new internal initiative to overhaul how new hires get ramped." }
      - { role: agent, text: "I'll plan the onboarding overhaul programme." }
    golden:
      requests: ["Start the internal initiative to overhaul new-hire ramp-up"]
      summary: "Start a new internal initiative to overhaul how new hires are ramped up."
      outcomes: ["Onboarding overhaul initiative chartered"]

probes:
  # ===== Semantic probes (22) — zero content words shared with the target ===
  # Each query is a full paraphrase: only meaning, never a shared token,
  # connects it to its expected Conversation (US-19). Distractor siblings make
  # this ranking, not topical presence.

  - query: "remind me when I wanted that opening quarter earnings breakdown finished before the weekend"
    arm: semantic
    expect_conversation: 1
  - query: "what was that third quarter staffing numbers writeup the directors wanted at the start of the week"
    arm: semantic
    expect_conversation: 2
  - query: "pull the autumn period staffing tally for the trustees"
    arm: semantic
    expect_conversation: 2
  - query: "pull apart how that rival firm operates before the team retreat"
    arm: semantic
    expect_conversation: 3

  - query: "look into why last weeks schema upgrade rollout blew up in production"
    arm: semantic
    expect_conversation: 4
  - query: "figure out why the billing flow keeps rejecting customer transactions"
    arm: semantic
    expect_conversation: 5
  - query: "the early morning incident where the data import phase choked and froze the whole deployment"
    arm: semantic
    expect_conversation: 6

  - query: "remind me about the fortnight getaway across the far eastern archipelago in the fall"
    arm: semantic
    expect_conversation: 7
  - query: "the fourteen day excursion to the land of the rising sun during leaf season"
    arm: semantic
    expect_conversation: 7
  - query: "set up that midsummer wave riding break on the Iberian shoreline"
    arm: semantic
    expect_conversation: 8
  - query: "the multi night circular motoring tour of the volcanic Nordic island I lined up for the thaw"
    arm: semantic
