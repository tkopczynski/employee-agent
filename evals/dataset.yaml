      summary: "Tune the Postgres connection pool that keeps getting exhausted under load."
      outcomes: ["Raised pool size and added connection timeouts"]

  - id: 14
    topic: "Redis cache eviction policy"
    turns:
      - { role: user,  text: "Change the Redis cache eviction policy; we're evicting hot keys too aggressively." }
      - { role: agent, text: "Switching to an LFU-style policy should protect the hot keys." }
    golden:
      requests: ["Change the Redis cache eviction policy that drops hot keys"]
      summary: "Change the Redis cache eviction policy that is dropping hot keys too aggressively."
      outcomes: ["Moved Redis to an LFU eviction policy"]

  - id: 15
