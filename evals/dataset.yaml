# Retrieval-quality eval corpus (Issue 02 — the honest, discriminating corpus).
#
# Authored to the ADR-0008 honesty contract (the eval is only as good as this):
#
#   * Semantic probes share ZERO content words with their target Conversation's
#     indexed Units (every user Turn + every golden request + the golden summary
#     prose — exactly what runner._units_for indexes; agent Turns and outcomes
#     are NOT indexed, so they do not constrain a probe). Only meaning connects,
#     so the semantic arm is genuinely exercised (US-19).
#   * Keyword probes hinge on a rare exact token the User would recall verbatim
#     (an error code, a project codename). A sibling *distractor* Conversation
#     discusses the same topic in paraphrase but never uses that exact token, so
#     only the keyword arm can disambiguate (US-20): ERR_4711 (conv 4) vs the
#     token-free paraphrase (conv 6); "Project Halibut" (conv 19) vs the
#     codename-free initiative (conv 20).
#   * Distractor clusters are >=2 sibling topics so a probe must resolve to one
#     specific Conversation — ranking under test, not mere topical match:
#     quarterly reports (1-3), deploy/migration incidents (4-6), trips (7-9),
#     hiring (10-12), infra tuning (13-15), personal admin (16-18), internal
#     initiatives (19-20).
#
# Probe queries are deliberately punctuation-free word sequences: the Agent
# feeds the LLM's raw query straight into FTS5 MATCH (no sanitisation), where
# '-' and ';' are query metacharacters. This is the same query shape as the
# Issue 01 seed and the spec schema; it does not touch the honesty contract
# (content words are identical with or without the hyphen — only meaning, never
# a shared token, connects a semantic probe to its target).
#
# ids are 1..20 contiguous: the corpus is built in id order into a fresh
# SQLite, so an authored id equals the Store-assigned conversation_id (the
# loader/runner id-invariant) and a probe's expected Conversation is
# unambiguous.
#
# The floor is empirical (ADR-0008): set ~0.05-0.10 below the first observed
# real-embedder run so the run PASSes and the threshold reflects reality, not
# an aspiration. Re-tune by hand as the corpus or the knobs change.
#
# First observed run (BAAI/bge-small-en-v1.5, recall_k=6, rrf_k=60):
# overall recall@k=1.00, hit@1=0.97 (keyword 1.00/1.00, semantic 1.00/0.95 —
# the lone non-rank-1 row is the conv-4/conv-6 keyword cluster, where only the
# ERR_4711 keyword probe can disambiguate, by design). Floor set a ~0.10 / ~0.09
# margin below those so embedder jitter or a corpus tweak does not false-fail.

floor:
  recall_at_k: 0.90   # observed 1.00 — overall recall@recall_k must be >= this
  hit_at_1: 0.88      # observed 0.97 — overall hit@1 must be >= this

conversations:
  # --- Cluster A: quarterly reports (1-3) — ranking distractors -------------
  - id: 1
    topic: "Q1 revenue report"
    turns:
      - { role: user,  text: "Can you prepare the Q1 revenue report by Friday?" }
      - { role: agent, text: "On it — I'll have the Q1 revenue numbers drafted by Friday." }
    golden:
      requests: ["Prepare the Q1 revenue report by Friday"]
      summary: "Prepare the Q1 revenue report by Friday."
      outcomes: ["Q1 revenue report drafted"]

  - id: 2
    topic: "Q3 headcount report"
    turns:
      - { role: user,  text: "I need the Q3 headcount report for the board on Monday." }
      - { role: agent, text: "Understood — Q3 headcount report for the board, ready Monday." }
    golden:
      requests: ["Produce the Q3 headcount report for the board by Monday"]
      summary: "Produce the Q3 headcount report for the board by Monday."
      outcomes: ["Q3 headcount report produced"]

  - id: 3
    topic: "Competitor teardown report"
