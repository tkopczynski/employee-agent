      outcomes: ["Passport renewal application submitted"]

  - id: 18
    topic: "Car annual service"
    turns:
      - { role: user,  text: "Schedule the car in for its annual service and an oil change." }
      - { role: agent, text: "I'll book the annual service and the oil change." }
    golden:
      requests: ["Schedule the car's annual service and oil change"]
      summary: "Schedule the car for its annual service and an oil change."
      outcomes: ["Car service booked at the dealership"]

  # --- Cluster G: internal initiatives (19-20) — keyword cluster -----------
  # conv 19 carries the codename "Project Halibut"; conv 20 is the same kind
  # of internal-initiative kickoff but never uses the codename.
  - id: 19
    topic: "Project Halibut kickoff"
    turns:
