      - { role: user,  text: "Put together a competitor teardown report on Acme before the offsite." }
      - { role: agent, text: "Will do — a teardown of Acme ahead of the offsite." }
    golden:
      requests: ["Compile a competitor teardown report on Acme before the offsite"]
      summary: "Compile a competitor teardown report on Acme before the offsite."
      outcomes: ["Competitor teardown of Acme compiled"]

  # --- Cluster B: deploy/migration incidents (4-6) — keyword cluster --------
  # conv 4 carries the rare token ERR_4711; conv 6 paraphrases the SAME
  # incident topic but never uses it, so only the keyword arm separates them.
  - id: 4
    topic: "Database migration failed with ERR_4711"
    turns:
      - { role: user,  text: "The deploy failed with ERR_4711 during the database migration. Can you investigate?" }
      - { role: agent, text: "Looking into ERR_4711 in the migration step now." }
    golden:
      requests: ["Investigate the ERR_4711 failure in the database migration"]
      summary: "Investigate the ERR_4711 failure during the database migration."
      outcomes: ["Root-caused ERR_4711 to a missing index on the migration table"]

  - id: 5
    topic: "Payment service PAYSVC-502 errors"
    turns:
      - { role: user,  text: "Checkout is throwing PAYSVC-502 from the payment service. Please dig in." }
      - { role: agent, text: "On it — chasing down PAYSVC-502 in the payment path." }
    golden:
      requests: ["Investigate the PAYSVC-502 errors from the payment service"]
      summary: "Investigate the PAYSVC-502 errors coming from the payment service at checkout."
      outcomes: ["Traced PAYSVC-502 to an expired upstream certificate"]

  - id: 6
    topic: "Schema rollout stalled the release (paraphrase distractor, no code)"
    turns:
      - { role: user,  text: "Our schema rollout broke the population step last night and the release stalled. Help me sort it." }
      - { role: agent, text: "Let's untangle the stalled release and the broken population step." }
    golden:
      requests: ["Fix the broken schema rollout that stalled the release"]
      summary: "The schema rollout broke the population step and stalled the release overnight."
      outcomes: ["Recovered the stalled release after fixing the population step"]

  # --- Cluster C: trips (7-9) — semantic ranking distractors ---------------
  - id: 7
    topic: "Autumn trip to Japan"
    turns:
      - { role: user,  text: "Help me plan a two week trip to Japan in autumn." }
      - { role: agent, text: "Tokyo, Kyoto, and Hakone over two weeks in autumn — sound good?" }
    golden:
      requests: ["Plan a two week autumn trip to Japan"]
      summary: "Plan a two week autumn trip to Japan."
      outcomes: ["Drafted a Tokyo-Kyoto-Hakone itinerary"]

  - id: 8
