      - { role: agent, text: "The ring road over a few weeks next spring works well." }
    golden:
      requests: ["Arrange a self-drive loop around Iceland next spring"]
      summary: "Arrange a self-drive loop around Iceland next spring."
      outcomes: ["Built a ring-road driving schedule"]

  # --- Cluster D: hiring decisions (10-12) ---------------------------------
  - id: 10
    topic: "Hire a senior backend engineer"
    turns:
      - { role: user,  text: "We should open a role for a senior backend engineer this quarter." }
      - { role: agent, text: "I'll draft the senior backend engineer opening." }
