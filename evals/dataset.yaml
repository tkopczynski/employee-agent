  - query: "when did I bring up creating a high level server side developer slot this period"
    arm: semantic
    expect_conversation: 10
  - query: "find someone to lead the look and feel of our handheld app"
    arm: semantic
    expect_conversation: 11
  - query: "were we leaning toward a freelancer or a permanent staffer for that metrics seat"
    arm: semantic
    expect_conversation: 12

  - query: "the relational database running out of free sessions when traffic surges"
    arm: semantic
