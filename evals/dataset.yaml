      summary: "Decide whether the new data analytics position should be a contractor or a full-time hire."
      outcomes: ["Chose a full-time data analytics hire"]

  # --- Cluster E: infra / performance tuning (13-15) -----------------------
  - id: 13
    topic: "Postgres connection pool exhaustion"
    turns:
      - { role: user,  text: "The Postgres connection pool keeps getting exhausted under load. Can you tune it?" }
      - { role: agent, text: "I'll resize the pool and add timeouts." }
    golden:
